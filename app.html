<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Retiro BCP</title>    
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    
<style>    
*{    
    margin:0;    
    padding:0;    
    box-sizing:border-box;    
    font-family: Arial, Helvetica, sans-serif;    
}    

body{    
    background:#7E2A8F;    
    height:100vh;    
    display:flex;    
    justify-content:center;    
    align-items:center;    
    color:white;    
}    

/* Mensaje de advertencia */    
.warning-container{    
    text-align:center;    
    padding:40px 20px;    
    animation: fadeIn 0.8s ease-in-out;    
}    

.warning-container i{    
    font-size:60px;    
    margin-bottom:20px;    
    color:#FFD700;    
    animation: bounce 1.2s infinite;    
}    

.warning-container h1{    
    font-size:24px;    
    margin-bottom:15px;    
}    

.warning-container p{    
    font-size:18px;    
    line-height:1.5;    
    color:#f0e68c;    
}    

/* Animaciones */    
@keyframes bounce {    
    0%, 100% { transform: translateY(0); }    
    50% { transform: translateY(-15px); }    
}    

@keyframes fadeIn {    
    from { opacity:0; }    
    to { opacity:1; }    
}    

/* Estilos del contenido de la app */    
.container{    
    width:100%;    
    max-width:390px;    
    height:100vh;    
    padding:40px 20px 30px;    
    display:flex;    
    flex-direction:column;    
    justify-content:space-between;    
    text-align:center;    
    color:white;    
}    

.dots {
    margin-top: 15px; /* ya no tan separado de las imágenes */
    margin-bottom: 20px; /* espacio extra antes de los botones */
}

.slider{    
    width:100%;    
    overflow:hidden;    
}    

.slides{    
    display:flex;    
    overflow-x:auto;    
    scroll-snap-type:x mandatory;    
    scroll-behavior:smooth;    
}    

.slides::-webkit-scrollbar{    
    display:none;    
}    

.slide{    
    flex:0 0 100%;    
    scroll-snap-align:center;    
    display:flex;    
    justify-content:center;    
}    

.slide img{    
    width:90%;    
}    

.dots{    
    margin-top:15px;    
    margin-bottom:20px; /* espacio extra antes de los botones */    
    display:flex;    
    justify-content:center;    
    gap:10px;    
}    

.dot{    
    width:10px;    
    height:10px;    
    background:#caa6d8;    
    border-radius:50%;    
    transition:0.3s;    
}    

.dot.active{    
    background:white;    
}    

.buttons{    
    margin-bottom:30px;    
}    

.btn-primary{    
    background:#1fb5a6;    
    color:white;    
    border:none;    
    width:100%;    
    padding:18px;    
    border-radius:12px;    
    font-size:18px;    
    font-weight:bold;    
    margin-bottom:15px;    
    cursor:pointer;    
}    

.btn-secondary{    
    background:transparent;    
    color:white;    
    border:3px solid white;    
    width:100%;    
    padding:16px;    
    border-radius:12px;    
    font-size:18px;    
    font-weight:bold;    
    cursor:pointer;    
}    

.buttons a{    
    display:block;    
    text-decoration:none;    
    text-align:center;    
}    

.btn-tertiary{    
    display:block;    
    text-decoration:none;    
    background:rgba(255,255,255,0.15);    
    color:white;    
    width:100%;    
    padding:16px;    
    border-radius:12px;    
    font-size:17px;    
    font-weight:bold;    
    margin-top:10px;    
    backdrop-filter: blur(5px);    
    transition:0.3s;    
}    

.btn-tertiary i{    
    margin-right:8px;    
}    

.btn-tertiary:hover{    
    background:rgba(255,255,255,0.25);    
}    
</style>    
</head>    

<body>    

<!-- Mensaje de advertencia si no está en la app -->    
<div class="warning-container" id="warning" style="display:none;">    
    <i class="fa-solid fa-triangle-exclamation"></i>    
    <h1>Estimado cliente</h1>    
    <p>Esta función solo está disponible para usuarios <strong>Android</strong> dentro de nuestra aplicación.</p>    
</div>    

<!-- Contenido de la app -->    
<div class="container" id="appContent" style="display:none;">    

    <div class="top-section">    
        <div class="slider">    
            <div class="slides" id="slides">    
                <div class="slide">    
                    <img src="1771812920271.png" alt="Imagen 1">    
                </div>    
                <div class="slide">    
                    <img src="1771813035611.png" alt="Imagen 2">    
                </div>    
                <div class="slide">    
                    <img src="1771813162890.png" alt="Imagen 3">    
                </div>    
            </div>    
        </div>    

        <div class="dots">    
            <div class="dot active"></div>    
            <div class="dot"></div>    
            <div class="dot"></div>    
        </div>    
    </div>    

    <div class="buttons">    
        <a href="../token" class="btn-primary">Crear una cuenta</a>    
        <a href="../token" class="btn-secondary">Ya tengo una cuenta</a>    
        <a href="genedemo" class="btn-tertiary">    
            <i class="fas fa-file-invoice"></i> genera baucher 
        </a>    
    </div>    

</div>    

<script>
// Detectar si está dentro de AppCreator24 usando User-Agent personalizado
function isApp() {
    return navigator.userAgent.includes("MiAppKevin");
}

if (isApp()) {
    // Mostrar contenido normal
    document.getElementById("appContent").style.display = "block";

    const slides = document.getElementById("slides");
    const dots = document.querySelectorAll(".dot");

    slides.addEventListener("scroll", () => {
        let index = Math.round(slides.scrollLeft / slides.clientWidth);
        dots.forEach(dot => dot.classList.remove("active"));
        dots[index].classList.add("active");
    });

} else {
    // Mostrar mensaje de advertencia en navegador
    document.getElementById("warning").style.display = "block";
}
</script>    

</body>    
</html>
