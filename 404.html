<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#720e9e">
<link rel="icon" type="image/png" href="imagen/app_icon_xxxhdpi.png">
<title>404 - Acceso Denegado</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="cc/404.css">
</head>
<body>

<div class="bg">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="card">

    <div class="icon">
        <i class="fas fa-lock"></i>
    </div>

    <div class="error">404</div>

    <h1>Acceso Denegado</h1>

    <p>
        No tienes permisos para acceder a esta página.
        Verifica tus credenciales o contacta con el administrador.
    </p>

    <div class="info">
        <div>🔒 Recurso protegido</div>
        <div>🛡️ Acceso restringido</div>
        <div>⚡ Error HTTP 403 Forbidden</div>
    </div>

    <div class="btns">
        <button class="btn home"
        onclick="location.href='/'">
            <i class="fas fa-home"></i>
            Inicio
        </button>

        <button class="btn back"
        onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
            Volver
        </button>
    </div>

    <div class="footer">
        © 2026 Sistema de Seguridad
    </div>

</div>

</body>
</html>
